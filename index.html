<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無限ガチャシミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes bounce-custom {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-custom {
            animation: bounce-custom 0.3s ease infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700 text-center">
        <h1 class="text-3xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-rose-500">
            🌟 無限ガチャ 🌟
        </h1>
        <p class="text-xs text-slate-400 mb-6">確率：SSR 3% / SR 12% / R 85%</p>

        <!-- カウンター -->
        <div class="grid grid-cols-4 gap-2 mb-6 bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 text-sm">
            <div><div class="text-slate-400 text-xs">総数</div><div id="count-total" class="font-bold text-lg text-white">0</div></div>
            <div><div class="text-amber-400 text-xs">SSR</div><div id="count-ssr" class="font-bold text-lg text-amber-400">0</div></div>
            <div><div class="text-purple-400 text-xs">SR</div><div id="count-sr" class="font-bold text-lg text-purple-400">0</div></div>
            <div><div class="text-sky-400 text-xs">R</div><div id="count-r" class="font-bold text-lg text-sky-400">0</div></div>
        </div>

        <!-- ガチャ結果表示エリア -->
        <div id="result-container" class="min-h-[160px] flex flex-wrap gap-2 justify-center items-center p-4 bg-slate-950 rounded-xl mb-6 border border-slate-800 transition-all">
            <p id="placeholder" class="text-slate-500 text-sm animate-pulse">ボタンを押してガチャを回そう！</p>
        </div>

        <!-- 操作ボタン -->
        <div class="flex gap-3">
            <button onclick="pullGacha(1)" class="flex-1 py-4 bg-gradient-to-r from-slate-700 to-slate-600 hover:from-slate-600 hover:to-slate-500 text-white font-bold rounded-xl shadow-lg transform active:scale-95 transition cursor-pointer">
                1回引く
            </button>
            <button onclick="pullGacha(10)" class="flex-1 py-4 bg-gradient-to-r from-amber-500 to-rose-500 hover:from-amber-400 hover:to-rose-400 text-white font-extrabold rounded-xl shadow-lg shadow-rose-500/20 transform active:scale-95 transition cursor-pointer">
                🔥 10連引く
            </button>
        </div>

        <!-- リセットボタン -->
        <button onclick="resetGacha()" class="mt-6 text-xs text-slate-500 hover:text-slate-300 underline cursor-pointer">
            データをリセットする
        </button>
    </div>

    <script>
        // ガチャのデータ設定
        const ITEM_POOL = {
            SSR: { name: "🌈 レア度：SSR", chance: 0.03, bg: "bg-gradient-to-r from-amber-400 to-rose-400 text-slate-900 font-black border-2 border-amber-300 shadow-lg shadow-amber-500/20" },
            SR: { name: "🔮 レア度：SR", chance: 0.12, bg: "bg-purple-600 text-white font-bold border border-purple-400" },
            R: { name: "⚔️ レア度：R", chance: 0.85, bg: "bg-slate-700 text-slate-300 text-xs" }
        };

        // カウンターの初期化
        let stats = { total: 0, SSR: 0, SR: 0, R: 0 };

        function pullGacha(times) {
            const container = document.getElementById('result-container');
            const placeholder = document.getElementById('placeholder');
            
            if (placeholder) placeholder.remove();
            container.innerHTML = ''; // 前回の結果をクリア

            for (let i = 0; i < times; i++) {
                const rand = Math.random();
                let rarity = 'R';

                if (rand < ITEM_POOL.SSR.chance) {
                    rarity = 'SSR';
                } else if (rand < ITEM_POOL.SSR.chance + ITEM_POOL.SR.chance) {
                    rarity = 'SR';
                }

                // カウントアップ
                stats.total++;
                stats[rarity]++;

                // 画面に表示する要素の作成
                const badge = document.createElement('div');
                badge.className = `${ITEM_POOL[rarity].bg} px-3 py-2 rounded-lg text-sm text-center flex-1 min-w-[80px] max-w-[120px] transition-all duration-300`;
                badge.innerText = ITEM_POOL[rarity].name;
                
                // SSRを引いた時にちょっと跳ねさせる演出
                if (rarity === 'SSR') {
                    badge.classList.add('animate-bounce-custom');
                }

                container.appendChild(badge);
            }

            updateDOM();
        }

        function updateDOM() {
            document.getElementById('count-total').innerText = stats.total;
            document.getElementById('count-ssr').innerText = stats.SSR;
            document.getElementById('count-sr').innerText = stats.SR;
            document.getElementById('count-r').innerText = stats.R;
        }

        function resetGacha() {
            stats = { total: 0, SSR: 0, SR: 0, R: 0 };
            updateDOM();
            const container = document.getElementById('result-container');
            container.innerHTML = '<p id="placeholder" class="text-slate-500 text-sm animate-pulse">ボタンを押してガチャを回そう！</p>';
        }
    </script>
</body>
</html>
